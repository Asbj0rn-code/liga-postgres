<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga PostgreSQL - Región de Kanto (Hardcore)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* Dark Mode Base */
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .font-mono { font-family: 'Fira Code', monospace; }

        /* Drag & Drop Styles */
        .dropzone {
            display: inline-block; min-width: 120px; min-height: 30px; vertical-align: middle;
            border: 2px dashed #475569; background-color: #020617; border-radius: 0.375rem;
            margin: 0 4px; padding: 2px 8px; transition: all 0.2s ease;
            text-align: center; color: #94a3b8; font-weight: 600;
        }
        .dropzone.drag-over { border-color: #ef4444; background-color: #1e293b; transform: scale(1.05); box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
        .dropzone.correct { border-color: #10b981; border-style: solid; background-color: rgba(16, 185, 129, 0.15); color: #34d399; }
        .dropzone.incorrect { border-color: #ef4444; border-style: solid; background-color: rgba(239, 68, 68, 0.15); color: #f87171; }

        .draggable-chip {
            display: inline-flex; align-items: center; justify-content: center;
            cursor: grab; background-color: #dc2626; color: white;
            font-family: 'Fira Code', monospace; font-size: 0.8rem;
            padding: 0.25rem 0.65rem; border-radius: 9999px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s, background-color 0.2s; user-select: none; white-space: nowrap;
            border: 2px solid #991b1b; margin-bottom: 0.25rem;
        }
        .draggable-chip:active { cursor: grabbing; transform: scale(0.95); background-color: #991b1b; }
        .draggable-chip:hover { background-color: #ef4444; }
        
        .word-bank {
            min-height: 90px; border: 2px dashed #475569; border-radius: 0.5rem;
            padding: 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem;
            align-items: center; justify-content: center; background-color: #1e293b;
            transition: background-color 0.2s;
        }
        .word-bank.drag-over { background-color: #0f172a; border-color: #64748b; }

        /* Multiple Choice Styles */
        .mc-option { transition: all 0.2s; border: 2px solid #334155; background-color: #1e293b; color: #f8fafc; }
        .mc-option:hover { border-color: #ef4444; background-color: #27272a; }
        .mc-option.selected { border-color: #ef4444; background-color: #450a0a; box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.3); }
        .mc-option.correct-reveal { border-color: #10b981; background-color: #064e3b; color: #6ee7b7; }
        .mc-option.incorrect-reveal { border-color: #ef4444; background-color: #7f1d1d; color: #fca5a5; }

        /* General & Theme Elements */
        .no-select { user-select: none; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden-view { display: none !important; }
        
        .pokeball-header {
            background: linear-gradient(to bottom, #b91c1c 0%, #b91c1c 48%, #020617 48%, #020617 52%, #1e293b 52%, #1e293b 100%);
            border-bottom: 4px solid #020617;
        }
        
        /* Gym Cards - Removed the translateY to avoid jittery hover selection */
        .gym-card { transition: box-shadow 0.2s, border-color 0.2s; background-color: #1e293b; border: 2px solid #334155; }
        .gym-card:hover { box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.3); border-color: #ef4444; }
        .gym-completed { border-color: #f59e0b; background-color: #27272a; }
        .gym-completed:hover { border-color: #d97706; box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.2); }

        /* Image Handlers */
        .leader-img { object-fit: cover; object-position: top; background-color: #334155; image-rendering: auto; }
        .fallback-active { image-rendering: pixelated; object-fit: contain; background-color: #0f172a; padding: 4px; }
        
        /* Badge Case */
        .badge-case { background: radial-gradient(circle, #1e293b 0%, #020617 100%); border: 8px solid #0f172a; border-radius: 1rem; box-shadow: inset 0 10px 20px rgba(0,0,0,0.8); }
        .badge-slot { background-color: rgba(2, 6, 23, 0.6); border: 2px solid rgba(51, 65, 85, 0.8); border-radius: 50%; box-shadow: inset 0 4px 8px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;}
        
        .badge-img { object-fit: contain; transition: all 0.3s ease; }
        .badge-locked { filter: grayscale(100%) brightness(0.2) opacity(0.5); }
        .badge-earned { 
            filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.8));
            animation: badgeShineImg 2s infinite alternate; 
        }
        @keyframes badgeShineImg { 
            from { filter: drop-shadow(0 0 3px rgba(251, 191, 36, 0.5)); } 
            to { filter: drop-shadow(0 0 15px rgba(251, 191, 36, 1)); } 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="pokeball-header shadow-2xl sticky top-0 z-20">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3 cursor-pointer bg-slate-900/90 px-4 py-2 rounded-full backdrop-blur-md border border-slate-700" onclick="quitToMenu()">

                </div>
                <h1 class="text-xl sm:text-2xl font-black uppercase tracking-wider text-white">
                    Liga <span class="text-red-500">PostgreSQL</span>
                </h1>
            </div>
            
            <div id="menu-header-controls" class="flex flex-wrap justify-center items-center gap-3">
                <button onclick="clearSave()" class="text-xs font-bold text-slate-400 hover:text-red-400 uppercase tracking-wider transition-colors">
                    &#9888; Borrar Partida
                </button>
            </div>

            <div id="quiz-header-controls" class="hidden flex flex-wrap justify-center items-center gap-3">
                <button onclick="quitToMenu()" class="text-xs font-bold text-slate-300 hover:text-white uppercase tracking-wider bg-slate-800 hover:bg-red-600 px-3 py-2 rounded-full transition-colors border border-slate-600 shadow-md">
                    &#8592; Huir
                </button>
                <div class="flex items-center gap-2 bg-slate-950 px-4 py-2 rounded-full border border-slate-700 shadow-inner">
                    <span class="text-lg text-slate-300">&#9202;</span>
                    <span id="timer-display" class="font-mono text-slate-200 font-bold tracking-widest text-lg">00:00</span>
                </div>
                <div class="text-sm font-bold text-slate-200 bg-slate-950 px-4 py-2 rounded-full border border-slate-700 shadow-inner">

                    0 / 30
                </div>
            </div>
        </div>
        <div id="progress-bar-container" class="w-full bg-slate-950 h-1.5 hidden">
            <div id="progress-bar" class="bg-red-500 h-1.5 transition-all duration-300" style="width: 0%"></div>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full flex flex-col no-select relative">
        
        <!-- VIEW 1: MENU -->
        <div id="view-menu" class="w-full fade-in">
            <div class="mb-12 max-w-4xl mx-auto">
                <h2 class="text-center text-xl font-black text-slate-200 uppercase tracking-widest mb-4 drop-shadow-md">Estuche de Medallas</h2>
                <div class="badge-case p-6 sm:p-8 flex justify-center flex-wrap gap-4 sm:gap-6">
                    <div id="badge-case-container" class="flex flex-wrap justify-center gap-4 sm:gap-6"></div>
                </div>
                <p class="text-center text-slate-400 text-sm mt-4 font-semibold">240 preguntas únicas de dificultad creciente. Progreso guardado automáticamente.</p>
            </div>
            <div id="gyms-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>

        <!-- VIEW 2: ACTIVE QUIZ -->
        <div id="view-quiz" class="w-full hidden-view">
            <div class="flex flex-col gap-4 max-w-5xl mx-auto">
                
                <div id="gym-leader-header" class="bg-slate-800 rounded-2xl p-4 flex items-center gap-4 border border-slate-600 shadow-xl relative overflow-hidden">
                    <img id="active-gym-image" src="" alt="Líder" class="w-16 h-16 rounded-full border-2 border-slate-900 leader-img shadow-lg z-10">
                    <div class="z-10">
                        <h3 class="text-white font-black uppercase tracking-wider text-lg drop-shadow-md" id="active-gym-name">Gimnasio</h3>
                        <p class="text-slate-300 text-sm font-semibold" id="active-gym-leader">Líder: ???</p>

                    <div class="absolute right-4 opacity-10 z-0">
                        <img id="active-gym-badge" class="w-20 h-20 badge-img badge-locked" src="" alt="Medalla">
                    </div>
                </div>

                <div class="bg-slate-800 p-5 rounded-2xl shadow-lg border border-slate-700 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-2 h-full bg-red-600"></div>
                    <div class="flex justify-between items-start mb-2">
                        <div class="inline-block px-2 py-1 bg-red-900/40 text-red-400 text-xs font-black rounded-full uppercase tracking-wider border border-red-800" id="question-topic">Tema</div>
                        <div class="inline-block px-2 py-1 bg-slate-700/50 text-slate-300 text-xs font-black rounded-full uppercase tracking-wider border border-slate-600" id="question-type-badge">Tipo</div>
                    </div>
                    <h2 class="text-lg sm:text-xl font-bold text-white leading-relaxed" id="question-instruction">Instrucción</h2>
                    <p class="text-xs text-red-400 mt-2 font-semibold hidden bg-red-950/50 p-2 rounded-md inline-block border border-red-900" id="mc-instruction-hint"></p>
                </div>

                <div id="dynamic-content-container" class="w-full"></div>

                <div class="flex flex-col sm:flex-row justify-between items-center mt-2 p-4 bg-slate-800 rounded-2xl border border-slate-700 shadow-lg gap-4">
                    <div id="feedback-msg" class="font-bold text-base opacity-0 transition-opacity text-center sm:text-left flex-grow"></div>
                    <div class="flex gap-4 w-full sm:w-auto shrink-0">
                        <button id="btn-check" onclick="checkAnswers()" class="w-full sm:w-auto px-8 py-3 bg-slate-950 text-white font-black rounded-full hover:bg-slate-700 transition-colors shadow-md disabled:opacity-50 border border-slate-600">
                            Usar Ataque &#9876;
                        </button>
                        <button id="btn-next" onclick="nextQuestion()" class="hidden w-full sm:w-auto px-8 py-3 bg-red-600 text-white font-black rounded-full hover:bg-red-500 transition-colors shadow-[0_0_15px_rgba(220,38,38,0.6)] border border-red-400">
                            Siguiente &#10140;
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- VIEW 3: END SCREEN -->
        <div id="view-end" class="w-full hidden-view text-center py-12 bg-slate-800 rounded-3xl shadow-2xl border border-slate-600 px-6 max-w-4xl mx-auto relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-32 bg-slate-900 skew-y-3 transform origin-top-left -z-10"></div>
            <h2 class="text-4xl sm:text-5xl font-black text-white mt-4 mb-2 uppercase tracking-tight drop-shadow-md" id="end-title">¡Líder Derrotado!</h2>
            <p class="text-lg text-slate-300 mb-6 font-medium">Has superado la prueba de este gimnasio.</p>
            
            <div class="flex flex-col items-center mb-8">
                <div id="end-badge-showcase" class="mb-2 drop-shadow-[0_0_20px_rgba(251,191,36,0.4)]">
                    <img id="end-badge-image" class="w-28 h-28 badge-img badge-earned" src="" alt="Medalla">
                </div>
                <h3 class="text-xl font-black text-amber-400 uppercase tracking-wider drop-shadow-sm" id="end-badge-name">Medalla</h3>
            </div>
            
            <div class="flex flex-wrap justify-center gap-4 mb-8">
                <div class="bg-slate-900 border border-emerald-500/30 rounded-xl p-4 w-32 shadow-inner">
                    <p class="text-emerald-500 font-bold text-xs uppercase mb-1">Efectivos</p>
                    <p class="text-3xl font-black text-emerald-400" id="end-correct">0</p>
                </div>
                <div class="bg-slate-900 border border-red-500/30 rounded-xl p-4 w-32 shadow-inner">
                    <p class="text-red-500 font-bold text-xs uppercase mb-1">Fallos</p>
                    <p class="text-3xl font-black text-red-400" id="end-errors">0</p>
                </div>
                <div class="bg-slate-900 border border-sky-500/30 rounded-xl p-4 w-32 shadow-inner">
                    <p class="text-sky-500 font-bold text-xs uppercase mb-1">Tiempo</p>
                    <p class="text-2xl font-black text-sky-400 mt-1" id="end-time">00:00</p>
                </div>
            </div>

            <button onclick="quitToMenu()" class="px-8 py-3 bg-slate-950 text-white font-black rounded-full hover:bg-red-600 transition-all shadow-lg text-sm uppercase tracking-wider border border-slate-700 hover:border-red-400">
                Guardar y Volver
            </button>
        </div>

    </main>

    <!-- TEMPLATES -->
    <template id="tpl-drag-drop">
        <div class="bg-slate-950 rounded-2xl shadow-inner overflow-hidden border border-slate-800 flex flex-col">
            <div class="bg-slate-900 px-4 py-2 flex items-center border-b border-slate-800">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Pokedex_Terminal.sql</span>
            </div>
            <div class="p-5 overflow-x-auto flex-grow">
                <div id="code-container" class="font-mono text-sm sm:text-base leading-[2.5rem] text-sky-100 whitespace-pre-wrap"></div>
            </div>
        </div>
        <div class="mt-4">
            <h3 class="text-xs font-black text-slate-400 mb-2 uppercase tracking-wider flex items-center">
                <span class="mr-2 text-red-500">&#129520;</span> Mochila de Fragmentos
            </h3>
            <div id="word-bank" class="word-bank shadow-inner" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event, 'bank')"></div>
        </div>
    </template>
    <template id="tpl-multiple-choice"><div id="mc-container" class="space-y-3"></div></template>

    <script>
        // =========================================================================
        // GLOBAL IMAGE FALLBACK HANDLER
        // =========================================================================
        window.handleImgError = function(img, fallbackUrl) {
            img.onerror = null; 
            img.src = fallbackUrl;
            img.classList.add('fallback-active');
        };

        // =========================================================================
        // POKÉMON KANTO GYM DATA 
        // =========================================================================
        const kantoGyms = [
            { id: 1, city: "Ciudad Plateada", type: "Roca", leader: "Brock", image: "https://images.wikidexcdn.net/mwuploads/wikidex/9/99/latest/20230902182628/Cara_de_Brock_LGPE.png", fallback: "https://play.pokemonshowdown.com/sprites/trainers/brock.png", badgeName: "Medalla Roca", badgeImage: "https://images.wikidexcdn.net/mwuploads/wikidex/3/39/latest/20180812014627/Medalla_Roca.png", badgeFallback: "https://img.pokemondb.net/sprites/items/boulder-badge.png" },
            { id: 2, city: "Ciudad Celeste", type: "Agua", leader: "Misty", image: "https://images.wikidexcdn.net/mwuploads/wikidex/7/7f/latest/20230902182717/Cara_de_Misty_LGPE.png", fallback: "https://play.pokemonshowdown.com/sprites/trainers/misty.png", badgeName: "Medalla Cascada", badgeImage: "https://images.wikidexcdn.net/mwuploads/wikidex/6/60/latest/20180812013531/Medalla_Cascada.png", badgeFallback: "https://img.pokemondb.net/sprites/items/cascade-badge.png" },
            { id: 3, city: "Ciudad Carmín", type: "Eléctrico", leader: "Lt. Surge", image: "https://images.wikidexcdn.net/mwuploads/wikidex/b/b7/latest/20230902182607/Cara_de_Teniente_Surge_LGPE.png", fallback: "https://play.pokemonshowdown.com/sprites/trainers/ltsurge.png", badgeName: "Medalla Trueno", badgeImage: "https://images.wikidexcdn.net/mwuploads/wikidex/e/e6/latest/20180812014833/Medalla_Trueno.png", badgeFallback: "https://img.pokemondb.net/sprites/items/thunder-badge.png" },
            { id: 4, city: "Ciudad Azulona", type: "Planta", leader: "Erika", image: "https://images.wikidexcdn.net/mwuploads/wikidex/3/38/latest/20230902182638/Cara_de_Erika_LGPE.png", fallback: "https://play.pokemonshowdown.com/sprites/trainers/erika.png", badgeName: "Medalla Arcoíris", badgeImage: "https://images.wikidexcdn.net/mwuploads/wikidex/0/09/latest/20180812034547/Medalla_Arco%C3%ADris.png", badgeFallback: "https://img.pokemondb.net/sprites/items/rainbow-badge.png" },
            { id: 5, city: "Ciudad Fucsia", type: "Veneno", leader: "Koga", image: "https://images.wikidexcdn.net/mwuploads/wikidex/0/01/latest/20230902182705/Cara_de_Koga_LGPE.png", fallback: "https://play.pokemonshowdown.com/sprites/trainers/koga.png", badgeName: "Medalla Alma", badgeImage: "https://images.wikidexcdn.net/mwuploads/wikidex/c/c5/latest/20180812035225/Medalla_Alma.png", badgeFallback: "https://img.pokemondb.net/sprites/items/soul-badge.png" },
            { id: 6, city: "Ciudad Azafrán", type: "Psíquico", leader: "Sabrina", image: "https://images.wikidexcdn.net/mwuploads/wikidex/b/be/latest/20230902182727/Cara_de_Sabrina_LGPE.png", fallback: "https://play.pokemonshowdown.com/sprites/trainers/sabrina.png", badgeName: "Medalla Pantano", badgeImage: "https://images.wikidexcdn.net/mwuploads/wikidex/c/c2/latest/20180812035607/Medalla_Pantano.png", badgeFallback: "https://img.pokemondb.net/sprites/items/marsh-badge.png" },

            { id: 8, city: "Ciudad Verde", type: "Tierra", leader: "Giovanni", image: "https://images.wikidexcdn.net/mwuploads/wikidex/b/b4/latest/20230616195118/Giovanni_en_RFVH.png", fallback: "https://play.pokemonshowdown.com/sprites/trainers/giovanni.png", badgeName: "Medalla Tierra", badgeImage: "https://images.wikidexcdn.net/mwuploads/wikidex/1/16/latest/20180812035006/Medalla_Tierra.png", badgeFallback: "https://img.pokemondb.net/sprites/items/earth-badge.png" }

        // =========================================================================
        // EXACTLY 240 DISTINCT QUESTIONS GENERATOR (NO REPETITION, INCREASING DIFFICULTY)
        // =========================================================================
        
        // Atomics for Levels 1-4 (Basic 1-2 blanks)
        const dbBaseAtomics = [
            { t: 'dd', tp: 'DDL Básico', ins: 'Crea una tabla simple indicando que el ID no sea nulo.', tmpl: ['CREATE TABLE t1 (id INT ',{a:'NOT NULL'},');'], opt: ['NOT NULL', 'UNIQUE', 'SERIAL'] },

            { t: 'dd', tp: 'DDL Básico', ins: 'Borra una tabla solo si ya existe en el esquema.', tmpl: ['DROP TABLE ',{a:'IF EXISTS'},' t1;'], opt: ['IF EXISTS', 'WHEN EXISTS', 'CASCADE'] },
            { t: 'dd', tp: 'Secuencias', ins: 'Crea una secuencia básica que comience en 10.', tmpl: ['CREATE ',{a:'SEQUENCE'},' seq_1\n  ',{a:'START WITH'},' 10;'], opt: ['SEQUENCE', 'START WITH', 'BEGIN AT', 'TABLE'] },
            { t: 'dd', tp: 'Secuencias', ins: 'Indica el salto de la secuencia a 5 números por vez.', tmpl: ['ALTER SEQUENCE seq_1\n  ',{a:'INCREMENT BY'},' 5;'], opt: ['INCREMENT BY', 'STEP', 'JUMP'] },
            { t: 'dd', tp: 'Secuencias', ins: 'Avanza una secuencia manualmente para obtener el valor.', tmpl: ['SELECT ',{a:'nextval'},'(\'seq_1\');'], opt: ['nextval', 'currval', 'setval'] },
            { t: 'dd', tp: 'Secuencias', ins: 'Lee el último valor generado en esta conexión.', tmpl: ['SELECT ',{a:'currval'},'(\'seq_1\');'], opt: ['currval', 'nextval', 'session_val'] },
            { t: 'dd', tp: 'Vistas', ins: 'Crea una vista virtual leyendo todos los datos.', tmpl: ['CREATE ',{a:'VIEW'},' v1 ',{a:'AS'},'\nSELECT * FROM t1;'], opt: ['VIEW', 'AS', 'TABLE', 'IS'] },
            { t: 'dd', tp: 'Vistas', ins: 'Reemplaza una vista existente por una nueva definición.', tmpl: ['CREATE ',{a:'OR REPLACE'},' VIEW v1 AS\nSELECT id FROM t1;'], opt: ['OR REPLACE', 'AND UPDATE', 'IF EXISTS'] },
            { t: 'dd', tp: 'Vistas', ins: 'Concatena dos campos en la vista usando el operador de PG.', tmpl: ['CREATE VIEW v1 AS\nSELECT n1 ',{a:'||'},' n2 AS res FROM t1;'], opt: ['||', 'CONCAT', '&&', '+'] },
            { t: 'dd', tp: 'Vistas', ins: 'Elimina una vista del sistema.', tmpl: ['', {a:'DROP VIEW'},' v1;'], opt: ['DROP VIEW', 'DELETE VIEW', 'REMOVE VIEW'] },
            { t: 'dd', tp: 'Privilegios', ins: 'Crea un usuario con contraseña.', tmpl: ['CREATE ',{a:'USER'},' u1 ',{a:'WITH PASSWORD'},' \'123\';'], opt: ['USER', 'WITH PASSWORD', 'ROLE', 'IDENTIFIED BY'] },
            { t: 'dd', tp: 'Privilegios', ins: 'Otorga permiso de lectura a un usuario.', tmpl: ['', {a:'GRANT'},' SELECT ON t1 ',{a:'TO'},' u1;'], opt: ['GRANT', 'TO', 'GIVE', 'FOR'] },
            { t: 'dd', tp: 'Privilegios', ins: 'Revoca el permiso de inserción a un usuario.', tmpl: ['', {a:'REVOKE'},' INSERT ON t1 ',{a:'FROM'},' u1;'], opt: ['REVOKE', 'FROM', 'REMOVE', 'DROP'] },
            { t: 'dd', tp: 'Privilegios', ins: 'Consulta qué usuario está ejecutando la acción actual.', tmpl: ['SELECT ',{a:'CURRENT_USER'},';'], opt: ['CURRENT_USER', 'SESSION_USER', 'DB_USER'] }
        ]; // 18 base atomics

        const mcTheoryBase = [
            { tp: 'Teoría DDL', ins: '¿Diferencia entre Base de Datos y Esquema en PG?', opt: ['BD es compartida; Esquema requiere reconexión.', 'BD está aislada (reconexión); Esquemas comparten entorno.', 'Son sinónimos.'], ans: [1], sel: 'single' },
            { tp: 'Teoría Secuencias', ins: '¿Qué pasa si una secuencia NO CYCLE llega a su MAXVALUE y llamas a nextval?', opt: ['Reinicia al MINVALUE.', 'Lanza un error.', 'Devuelve NULL.', 'Sube el MAXVALUE.'], ans: [1], sel: 'single' },
            { tp: 'Teoría Vistas', ins: 'Selecciona las VERDADERAS sobre Vistas en PG:', opt: ['Almacenan datos físicamente.', 'Son tablas virtuales (consultas guardadas).', 'Simplifican JOINs complejos.', 'No admiten DML (Insert/Update) nunca.'], ans: [1, 2], sel: 'multiple' },
            { tp: 'Teoría Privilegios', ins: '¿Cuál es el superusuario por defecto de PostgreSQL?', opt: ['admin', 'postgres', 'root', 'sysdba'], ans: [1], sel: 'single' },
            { tp: 'Teoría DDL', ins: 'Al usar TRUNCATE TABLE, ¿qué opciones son exclusivas de PG?', opt: ['RESTART IDENTITY', 'DELETE ROWS', 'CASCADE', 'DROP KEYS'], ans: [0, 2], sel: 'multiple' },
            { tp: 'Teoría Privilegios', ins: 'Orden correcto para eliminar un usuario dueño de objetos:', opt: ['DROP USER -> DROP TABLES', 'REASSIGN OWNED -> DROP OWNED -> DROP USER', 'Solo DROP USER CASCADE'], ans: [1], sel: 'single' },
            { tp: 'Teoría Identidad', ins: 'Diferencia entre GENERATED ALWAYS y GENERATED BY DEFAULT', opt: ['ALWAYS impide insert manual; BY DEFAULT lo permite.', 'BY DEFAULT es más rápido.', 'Son lo mismo.'], ans: [0], sel: 'single' },
            { tp: 'Teoría Vistas', ins: '¿Para qué sirve WITH CHECK OPTION en una vista?', opt: ['Valida sintaxis.', 'Impide INSERTS que violen el WHERE de la vista.', 'Bloquea lectura.'], ans: [1], sel: 'single' },
            { tp: 'Teoría DDL', ins: 'En PG, ALTER TABLE ADD COLUMN sitúa la columna...', opt: ['Al principio.', 'Donde se indique con AFTER.', 'Siempre al final de la tabla.'], ans: [2], sel: 'single' },
            { tp: 'Teoría Privilegios', ins: '¿Existe FLUSH PRIVILEGES en PG?', opt: ['Sí, tras cada GRANT.', 'No, los cambios son inmediatos.', 'Se usa COMMIT PRIVILEGES.'], ans: [1], sel: 'single' },
            { tp: 'Teoría Roles', ins: 'Comando para que un usuario herede permisos de un rol:', opt: ['ADD rol TO user', 'GRANT rol TO user', 'SET ROLE user'], ans: [1], sel: 'single' },
            { tp: 'Teoría Monitoreo', ins: 'Vista para ver usuarios conectados en tiempo real:', opt: ['pg_user', 'pg_stat_activity', 'pg_connections'], ans: [1], sel: 'single' }
        ]; // 12 base theories
        
        let finalQuestions = [];
        let globalCounter = 0;

        for (let gymIdx = 0; gymIdx < 8; gymIdx++) {
            let gymQuestions = [];
            for (let qIdx = 0; qIdx < 30; qIdx++) {
                globalCounter++;
                if (qIdx % 5 === 0) {
                    let theory = mcTheoryBase[globalCounter % mcTheoryBase.length];
                    let variantContext = `[Contexto L${gymIdx+1}-Q${qIdx+1}] `;
                    gymQuestions.push({
                        type: 'mc',
                        topic: theory.tp,
                        selectionType: theory.sel,
                        instruction: variantContext + theory.ins,
                        options: theory.opt,
                        correct: theory.ans
                    });
                } else {
                    let difficultyBlanks = Math.min(5, Math.floor(gymIdx / 2) + 1);
                    let numConcepts = Math.min(3, Math.floor(gymIdx / 3) + 1);
                    
                    let compoundTemplate = [];
                    let compoundOptions = [];
                    let compoundInstruction = `[Dificultad ${difficultyBlanks}] `;
                    
                    for(let c=0; c<numConcepts; c++) {
                        let atomic = dbBaseAtomics[(globalCounter + c * 7) % dbBaseAtomics.length];
                        compoundInstruction += atomic.ins + " ";
                        
                        atomic.tmpl.forEach(t => {
                            if (typeof t === 'string') {
                                compoundTemplate.push(t);
                            } else {
                                let blankId = `d_${gymIdx}_${qIdx}_${c}_${compoundOptions.length}`;
                                compoundTemplate.push({ id: blankId, answer: t.a });
                                compoundOptions.push(t.a);
                            }
                        });
                        if(c < numConcepts - 1) compoundTemplate.push('\n');
                        
                        atomic.opt.forEach(o => {
                            if(!compoundOptions.includes(o) && compoundOptions.length < difficultyBlanks * 3) {
                                compoundOptions.push(o);
                            }
                        });
                    }
                    
                    if(gymIdx > 4) compoundOptions.push('AUTO_INCREMENT', 'MODIFY', 'NVARCHAR2', 'SYSDATE');
                    if(gymIdx > 6) compoundOptions.push('FLUSH', 'PRAGMA', 'DUAL');

                    compoundOptions = compoundOptions.sort(() => Math.random() - 0.5);

                    gymQuestions.push({
                        type: 'dd',
                        topic: 'Combate Táctico',
                        instruction: compoundInstruction.trim(),
                        template: compoundTemplate,
                        options: compoundOptions
                    });
                }
            }
            finalQuestions.push(gymQuestions);
        }

        const gymsData = kantoGyms.map((gym, index) => {
            return {
                ...gym,
                questions: finalQuestions[index]
            };
        });

        // =========================================================================
        // APP STATE & LOCAL STORAGE
        // =========================================================================
        let userProgress = {}; 
        let currentGym = null;
        let currentQuestionIndex = 0;
        let sessionErrors = 0;
        let sessionCorrect = 0;
        let timerInterval;
        let timeSeconds = 0;
        let selectedOptionsMC = [];

        const STORAGE_KEY = 'pgLigaKantoHardcoreProgress';

        function loadProgress() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) userProgress = JSON.parse(stored);
            } catch (e) { console.error("Error loading progress", e); }
        }

        function saveProgress() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(userProgress)); } 
            catch (e) { console.error("Error saving progress", e); }
        }

        function clearSave() {
            if(confirm("⚠️ ¿Borrar partida? Perderás todas las medallas obtenidas.")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        // =========================================================================
        // CORE LOGIC & RENDERING
        // =========================================================================
        function initApp() { 
            loadProgress();
            renderMenu(); 
        }

        function renderMenu() {
            switchView('view-menu');
            stopTimer();
            document.getElementById('menu-header-controls').classList.remove('hidden');
            
            const badgeCase = document.getElementById('badge-case-container');
            badgeCase.innerHTML = '';
            gymsData.forEach(gym => {
                const isCompleted = userProgress[gym.id] && userProgress[gym.id].completed;
                
                const slotEl = document.createElement('div');
                slotEl.className = 'w-14 h-14 sm:w-20 sm:h-20 badge-slot';
                
                const badgeEl = document.createElement('img');
                badgeEl.src = gym.badgeImage;
                badgeEl.title = isCompleted ? `${gym.badgeName} (Gimnasio ${gym.city})` : `Medalla Desconocida`;
                badgeEl.setAttribute('onerror', `handleImgError(this, '${gym.badgeFallback}', true)`);
                
                badgeEl.className = isCompleted ? 'w-10 h-10 sm:w-14 sm:h-14 badge-img badge-earned' : 'w-10 h-10 sm:w-14 sm:h-14 badge-img badge-locked';
                
                slotEl.appendChild(badgeEl);
                badgeCase.appendChild(slotEl);
            });

            const grid = document.getElementById('gyms-grid');
            grid.innerHTML = '';

            gymsData.forEach(gym => {
                const p = userProgress[gym.id];
                const isCompleted = p && p.completed;
                
                let statsHtml = `<p class="text-xs text-slate-400 mt-2 font-medium">Estado: <span class="text-red-500 font-bold">Pendiente (Nivel ${gym.id})</span></p>`;
                if (isCompleted) {
                    statsHtml = `
                        <div class="mt-4 flex flex-wrap justify-center gap-1 text-[10px] font-bold uppercase">
                            <span class="bg-emerald-900/50 text-emerald-400 border border-emerald-700 px-2 py-0.5 rounded-full">✓ ${p.correct}</span>
                            <span class="bg-red-900/50 text-red-400 border border-red-700 px-2 py-0.5 rounded-full">✗ ${p.errors}</span>
                            <span class="bg-slate-800 text-slate-300 border border-slate-600 px-2 py-0.5 rounded-full">⏱ ${formatTime(p.timeSeconds)}</span>
                        </div>
                    `;
                }

                const card = document.createElement('div');
                // REMOVED: No more translateY hover to prevent jumping or weird selection interactions
                card.className = `gym-card rounded-2xl p-4 flex flex-col h-full cursor-pointer ${isCompleted ? 'gym-completed' : ''}`;
                card.onclick = () => startGymBattle(gym.id);
                
                // REMOVED: the absolute positioned div with the "Gym X" and the lock symbol `&#128274;` 
                card.innerHTML = `
                    <div class="flex-grow flex flex-col items-center text-center">
                        <img src="${gym.image}" onerror="handleImgError(this, '${gym.fallback}')" alt="${gym.leader}" class="w-20 h-20 rounded-full border-4 ${isCompleted ? 'border-amber-500' : 'border-slate-600'} leader-img mb-2 mt-4 shadow-lg">
                        <h3 class="text-lg font-black text-slate-100 leading-tight">${gym.city}</h3>
                        <p class="text-xs font-bold text-slate-400 mb-1">Líder: <span class="text-red-400">${gym.leader}</span></p>
                        <span class="text-[10px] font-bold px-2 py-0.5 bg-slate-800 text-slate-200 rounded-md border border-slate-600 uppercase">Tipo ${gym.type}</span>
                        <div class="mt-auto w-full">
                            ${statsHtml}
                        </div>
                    </div>
                    <button class="mt-4 w-full py-2.5 ${isCompleted ? 'bg-amber-600 text-white hover:bg-amber-500' : 'bg-slate-700 text-white hover:bg-red-600 border border-slate-600 hover:border-red-500'} rounded-full font-black transition-all shadow-md uppercase tracking-wider text-xs">
                        ${isCompleted ? 'Revancha' : 'Desafiar'}
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        function startGymBattle(id) {
            currentGym = gymsData.find(c => c.id === id);
            currentQuestionIndex = 0;
            sessionErrors = 0;
            sessionCorrect = 0;
            
            document.getElementById('active-gym-name').textContent = `Gimnasio ${currentGym.city}`;
            document.getElementById('active-gym-leader').textContent = `Líder: ${currentGym.leader} - Dificultad Nivel ${currentGym.id}`;
            
            const gymImg = document.getElementById('active-gym-image');
            gymImg.classList.remove('fallback-active');
            gymImg.src = currentGym.image;
            gymImg.setAttribute('onerror', `handleImgError(this, '${currentGym.fallback}')`);
            
            const badgePreview = document.getElementById('active-gym-badge');
            badgePreview.src = currentGym.badgeImage;
            badgePreview.setAttribute('onerror', `handleImgError(this, '${currentGym.badgeFallback}')`);
            
            document.getElementById('menu-header-controls').classList.add('hidden');
            document.getElementById('quiz-header-controls').classList.remove('hidden');
            document.getElementById('progress-bar-container').classList.remove('hidden');
            
            startTimer();
            switchView('view-quiz');
            renderQuestion();
        }

        function renderQuestion() {
            if (currentQuestionIndex >= currentGym.questions.length) {
                endGymBattle();
                return;
            }

            const q = currentGym.questions[currentQuestionIndex];
            
            document.getElementById('question-topic').textContent = q.topic;
            document.getElementById('question-type-badge').textContent = q.type === 'dd' ? 'Constructor Sintáctico' : 'Análisis Teórico';
            document.getElementById('question-instruction').textContent = q.instruction;
            
            document.getElementById('error-counter').textContent = sessionErrors;
            document.getElementById('progress-text').textContent = `${currentQuestionIndex} / ${currentGym.questions.length}`;
            document.getElementById('progress-bar').style.width = `${(currentQuestionIndex / currentGym.questions.length) * 100}%`;

            document.getElementById('btn-check').classList.remove('hidden');
            document.getElementById('btn-check').disabled = false;
            document.getElementById('btn-next').classList.add('hidden');
            
            const feedbackMsg = document.getElementById('feedback-msg');
            feedbackMsg.className = 'font-bold text-sm sm:text-base opacity-0 transition-opacity text-center sm:text-left flex-grow';
            
            const container = document.getElementById('dynamic-content-container');
            container.innerHTML = ''; 
            const mcHint = document.getElementById('mc-instruction-hint');

            if (q.type === 'dd') {
                mcHint.classList.add('hidden');
                renderDragDrop(q, container);
            } else {
                mcHint.classList.remove('hidden');
                mcHint.textContent = q.selectionType === 'single' ? "Selecciona 1 sola respuesta correcta." : "Selecciona TODAS las respuestas correctas.";
                renderMultipleChoice(q, container);
            }
        }

        function renderDragDrop(q, container) {
            const tpl = document.getElementById('tpl-drag-drop').content.cloneNode(true);
            container.appendChild(tpl);
            const codeContainer = document.getElementById('code-container');
            
            q.template.forEach(part => {
                if (typeof part === 'string') {
                    codeContainer.appendChild(document.createTextNode(part));
                } else {
                    const dropzone = document.createElement('div');
                    dropzone.id = part.id;
                    dropzone.className = 'dropzone';
                    dropzone.dataset.answer = part.answer;
                    dropzone.textContent = '...';
                    dropzone.ondragover = allowDrop;
                    dropzone.ondragleave = dragLeave;
                    dropzone.ondrop = (e) => drop(e, 'zone');
                    codeContainer.appendChild(dropzone);
                }
            });

            const wordBank = document.getElementById('word-bank');
            q.options.forEach((opt, idx) => {
                const chip = document.createElement('div');
                chip.id = `chip-${currentQuestionIndex}-${idx}`;
                chip.className = 'draggable-chip';
                chip.draggable = true;
                chip.ondragstart = drag;
                chip.textContent = opt;
                wordBank.appendChild(chip);
            });
        }

        function renderMultipleChoice(q, container) {
            selectedOptionsMC = []; 
            const tpl = document.getElementById('tpl-multiple-choice').content.cloneNode(true);
            container.appendChild(tpl);
            const mcContainer = document.getElementById('mc-container');
            
            q.options.forEach((optText, idx) => {
                const btn = document.createElement('button');
                btn.className = 'mc-option w-full text-left p-3 sm:p-4 rounded-xl font-bold shadow-sm text-sm sm:text-base';
                btn.dataset.idx = idx;
                btn.innerHTML = `<span class="text-red-500 mr-2 opacity-50">▶</span> ${optText}`;
                btn.onclick = () => {
                    if (q.selectionType === 'single') {
                        selectedOptionsMC = [idx];
                        document.querySelectorAll('.mc-option').forEach(el => el.classList.remove('selected'));
                        btn.classList.add('selected');
                    } else {
                        const pos = selectedOptionsMC.indexOf(idx);
                        if (pos === -1) { selectedOptionsMC.push(idx); btn.classList.add('selected'); }
                        else { selectedOptionsMC.splice(pos, 1); btn.classList.remove('selected'); }
                    }
                };
                mcContainer.appendChild(btn);
            });
        }

        // --- Drag & Drop Core ---
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); ev.dataTransfer.effectAllowed = "move"; }
        function allowDrop(ev) { ev.preventDefault(); if(ev.currentTarget.classList.contains('dropzone') || ev.currentTarget.id === 'word-bank') ev.currentTarget.classList.add('drag-over'); }
        function dragLeave(ev) { ev.currentTarget.classList.remove('drag-over'); }
        function drop(ev, targetType) {
            ev.preventDefault();
            const target = ev.currentTarget;
            target.classList.remove('drag-over');
            const dataId = ev.dataTransfer.getData("text");
            const draggedElement = document.getElementById(dataId);
            if (!draggedElement) return;

            if (targetType === 'zone') {
                if (target.children.length > 0 && target.firstChild.nodeType === 1) document.getElementById('word-bank').appendChild(target.firstChild);
                if (target.childNodes.length > 0 && target.firstChild.nodeType === 3) target.innerHTML = '';
                target.appendChild(draggedElement);
                target.classList.remove('correct', 'incorrect');
            } else if (targetType === 'bank') {
                target.appendChild(draggedElement);
                document.querySelectorAll('.dropzone').forEach(z => {
                    if(z.children.length === 0) z.textContent = '...';
                    z.classList.remove('correct', 'incorrect');
                });
            }
        }

        // --- Validation ---
        function checkAnswers() {
            const q = currentGym.questions[currentQuestionIndex];
            let isCorrect = false, missingFields = false;

            if (q.type === 'dd') {
                const dropzones = document.querySelectorAll('.dropzone');
                let allCorrect = true;
                dropzones.forEach(zone => {
                    if (zone.children.length === 0 || zone.textContent === '...') {
                        missingFields = true; zone.classList.add('incorrect');
                    } else {
                        if (zone.firstChild.textContent === zone.dataset.answer) {
                            zone.classList.add('correct'); zone.classList.remove('incorrect');
                        } else {
                            zone.classList.add('incorrect'); zone.classList.remove('correct'); allCorrect = false;
                        }
                    }
                });
                if (!missingFields) isCorrect = allCorrect;
            } else {
                if (selectedOptionsMC.length === 0) missingFields = true;
                else {
                    const userSorted = [...selectedOptionsMC].sort(), correctSorted = [...q.correct].sort();
                    isCorrect = userSorted.length === correctSorted.length && userSorted.every((val, i) => val === correctSorted[i]);
                    document.querySelectorAll('.mc-option').forEach((n, i) => {
                        if(isCorrect && q.correct.includes(i)) n.classList.add('correct-reveal');
                        if(!isCorrect && selectedOptionsMC.includes(i)) n.classList.add('incorrect-reveal');
                    });
                }
            }

            const fb = document.getElementById('feedback-msg');
            fb.classList.remove('opacity-0');

            if (missingFields) {
                fb.textContent = "⚠️ Faltan datos por introducir.";
                fb.className = "font-bold text-sm sm:text-base text-amber-500 opacity-100 flex-grow text-center sm:text-left";
                return;
            }

            if (isCorrect) {
                fb.innerHTML = "&#10024; ¡Ataque Efectivo!";
                fb.className = "font-bold text-sm sm:text-base text-emerald-500 opacity-100 flex-grow text-center sm:text-left";
                sessionCorrect++;
                if(q.type === 'dd') document.querySelectorAll('.draggable-chip').forEach(c => c.draggable = false);
                else document.querySelectorAll('.mc-option').forEach(c => c.onclick = null);
                document.getElementById('btn-check').classList.add('hidden');
                document.getElementById('btn-next').classList.remove('hidden');
            } else {
                sessionErrors++;
                document.getElementById('error-counter').textContent = sessionErrors;
                fb.innerHTML = "&#10060; Sintaxis errónea.";
                fb.className = "font-bold text-sm sm:text-base text-red-500 opacity-100 flex-grow text-center sm:text-left";
                if (q.type === 'mc') setTimeout(() => document.querySelectorAll('.mc-option').forEach(el => el.classList.remove('incorrect-reveal')), 1500);
            }
        }

        function nextQuestion() { currentQuestionIndex++; renderQuestion(); }

        // --- Timers & View Management ---
        function startTimer() {
            clearInterval(timerInterval); timeSeconds = 0; updateTimerUI();
            timerInterval = setInterval(() => { timeSeconds++; updateTimerUI(); }, 1000);
        }
        function stopTimer() { clearInterval(timerInterval); }
        function updateTimerUI() { document.getElementById('timer-display').textContent = formatTime(timeSeconds); }
        function formatTime(s) { return `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`; }

        function switchView(viewId) {
            ['view-menu', 'view-quiz', 'view-end'].forEach(id => document.getElementById(id).classList.add('hidden-view'));
            const target = document.getElementById(viewId);
            target.classList.remove('hidden-view', 'fade-in'); void target.offsetWidth; target.classList.add('fade-in');
        }

        function quitToMenu() {
            stopTimer();
            document.getElementById('quiz-header-controls').classList.add('hidden');
            document.getElementById('progress-bar-container').classList.add('hidden');
            renderMenu();
        }

        function endGymBattle() {
            stopTimer();
            document.getElementById('quiz-header-controls').classList.add('hidden');
            document.getElementById('progress-bar-container').classList.add('hidden');
            
            // Save Progress locally
            userProgress[currentGym.id] = { completed: true, correct: sessionCorrect, errors: sessionErrors, timeSeconds: timeSeconds };
            saveProgress();

            document.getElementById('end-title').textContent = `¡Has derrotado a ${currentGym.leader}!`;
            document.getElementById('end-badge-name').textContent = `Obtuviste la ${currentGym.badgeName}`;
            
            const badgeImg = document.getElementById('end-badge-image');
            badgeImg.classList.remove('fallback-active');
            badgeImg.src = currentGym.badgeImage;
            badgeImg.setAttribute('onerror', `handleImgError(this, '${currentGym.badgeFallback}', true)`);

            document.getElementById('end-correct').textContent = sessionCorrect;
            document.getElementById('end-errors').textContent = sessionErrors;
            document.getElementById('end-time').textContent = formatTime(timeSeconds);

            switchView('view-end');
        }

        window.onload = initApp;
    </script>
</body>
</html>
